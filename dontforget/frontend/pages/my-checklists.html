<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checklist ของฉัน — Don't Forget</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
        flex-wrap: wrap;
        gap: 12px;
      }

      .filter-bar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }

      .filter-btn {
        padding: 6px 14px;
        border-radius: 99px;
        font-size: 0.8rem;
        font-weight: 600;
        background: var(--bg-card);
        border: 1px solid var(--border);
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.2s;
      }

      .filter-btn.active,
      .filter-btn:hover {
        background: var(--accent-glow);
        border-color: var(--accent);
        color: var(--accent);
      }

      .checklist-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 16px;
      }

      .cl-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        flex-direction: column;
      }

      .cl-card:hover {
        border-color: var(--accent);
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      }

      .cl-cover {
        height: 90px;
        background: linear-gradient(135deg, #1a2e1a, #0d1f12);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        position: relative;
        overflow: hidden;
      }

      .cl-cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        position: absolute;
      }

      .cl-public-badge {
        position: absolute;
        top: 8px;
        right: 8px;
        background: rgba(0, 0, 0, 0.6);
        padding: 2px 8px;
        border-radius: 99px;
        font-size: 0.65rem;
        font-weight: 600;
      }

      .cl-body {
        padding: 14px;
        flex: 1;
      }
      .cl-title {
        font-weight: 700;
        margin-bottom: 6px;
        font-size: 0.95rem;
      }
      /* ค้นหาส่วนนี้ในโค้ดของคุณ */
      .cl-desc {
        font-size: 0.8rem;
        color: #ffffff; /* เปลี่ยนจาก var(--text-muted) เป็น #ffffff */
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .cl-footer {
        padding: 10px 14px;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .cl-progress-text {
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      .cl-actions {
        display: flex;
        gap: 4px;
      }

      .icon-btn {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        background: transparent;
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.2s;
        color: var(--text-secondary);
      }

      .icon-btn:hover {
        background: var(--bg-hover);
        color: var(--text-primary);
      }
      .icon-btn.danger:hover {
        background: rgba(239, 68, 68, 0.1);
        border-color: var(--red);
        color: var(--red);
      }

      /* Modal */
      .visibility-toggle {
        display: flex;
        background: var(--bg-secondary);
        border-radius: var(--radius-sm);
        overflow: hidden;
        margin-bottom: 4px;
      }

      .vis-option {
        flex: 1;
        padding: 10px;
        text-align: center;
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-muted);
        transition: all 0.2s;
      }

      .vis-option.active {
        background: var(--bg-card);
        color: var(--text-primary);
      }
    </style>
  </head>
  <body>
    <div class="app-layout">
      <div id="sidebar-mount"></div>

      <main class="main-content">
        <div class="topbar">
          <h1 class="page-title">✅ Checklist ของฉัน</h1>
          <button class="btn btn-primary" onclick="openCreateModal()">
            + สร้าง Checklist
          </button>
        </div>

        <!-- Filter -->
        <div class="filter-bar" id="category-filter">
          <button class="filter-btn active" onclick="filterBy(null, this)">
            ทั้งหมด
          </button>
        </div>

        <!-- Grid -->
        <div id="checklist-grid">
          <div class="loading-state">
            <div class="spinner"></div>
            <span>กำลังโหลด...</span>
          </div>
        </div>
      </main>
    </div>

    <!-- Create/Edit Modal -->
    <div class="modal-overlay" id="cl-modal">
      <div
        class="modal-content"
        style="max-width: 500px; max-height: 90vh; overflow-y: auto"
      >
        <div class="modal-header">
          <div class="modal-title" id="modal-title">สร้าง Checklist ใหม่</div>
          <div class="modal-close" onclick="closeModal()">✕</div>
        </div>

        <input type="hidden" id="edit-id" />

        <div class="form-group">
          <label class="form-label">ชื่อ Checklist *</label>
          <input
            type="text"
            id="cl-title"
            class="form-input"
            placeholder="ชื่อรายการ..."
          />
        </div>

        <div class="form-group">
          <label class="form-label">คำอธิบาย</label>
          <textarea
            id="cl-desc"
            class="form-input"
            placeholder="อธิบายเพิ่มเติม..."
          ></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">หมวดหมู่</label>
          <select id="cl-category" class="form-input">
            <option value="">— เลือกหมวดหมู่ —</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">ภาพปก</label>
          <input
            type="file"
            id="cl-cover"
            class="form-input"
            accept="image/*"
          />
        </div>

        <div class="form-group">
          <label class="form-label">การมองเห็น</label>
          <div class="visibility-toggle">
            <div class="vis-option active" onclick="setVisibility(0, this)">
              🔒 ส่วนตัว
            </div>
            <div class="vis-option" onclick="setVisibility(1, this)">
              🌐 สาธารณะ
            </div>
          </div>
          <input type="hidden" id="cl-public" value="0" />
        </div>

        <div
          style="
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 8px;
          "
        >
          <button class="btn btn-secondary" onclick="closeModal()">
            ยกเลิก
          </button>
          <button class="btn btn-primary" onclick="saveChecklist()">
            บันทึก
          </button>
        </div>
      </div>
    </div>

    <script src="/js/sidebar.js"></script>
    <script src="/js/app.js"></script>
    <script>
      let allChecklists = [];
      let categories = [];
      let currentFilter = null;

      document.addEventListener("DOMContentLoaded", async () => {
        await loadAuth();
        await loadCategories();
        await loadChecklists();
      });

      async function loadCategories() {
        const res = await API.get("/api/categories");
        if (res.success) {
          categories = res.data;
          const sel = document.getElementById("cl-category");
          categories.forEach((c) => {
            sel.innerHTML += `<option value="${c.categoryID}">${c.icon} ${c.categoryName}</option>`;
          });
          const filterBar = document.getElementById("category-filter");
          categories.forEach((c) => {
            const btn = document.createElement("button");
            btn.className = "filter-btn";
            btn.textContent = `${c.icon} ${c.categoryName}`;
            btn.onclick = function () {
              filterBy(c.categoryID, this);
            };
            filterBar.appendChild(btn);
          });
        }
      }

      async function loadChecklists() {
        const res = await API.get("/api/checklists/my");
        if (res.success) {
          allChecklists = res.data;
          renderChecklists(allChecklists);
        }
      }

      function filterBy(categoryID, btn) {
        currentFilter = categoryID;
        document
          .querySelectorAll(".filter-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        const filtered = categoryID
          ? allChecklists.filter((c) => c.categoryID == categoryID)
          : allChecklists;
        renderChecklists(filtered);
      }

      function renderChecklists(list) {
        const grid = document.getElementById("checklist-grid");
        if (!list.length) {
          grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <h3>ยังไม่มี Checklist</h3>
            <p>กดปุ่ม "สร้าง Checklist" เพื่อเริ่มต้น</p>
          </div>`;
          return;
        }
        grid.innerHTML =
          `<div class="checklist-grid">` +
          list
            .map((c) => {
              const progress =
                c.itemCount > 0
                  ? Math.round((c.checkedCount / c.itemCount) * 100)
                  : 0;
              const catColor = getCategoryColor(c.categoryName);
              return `
          <div class="cl-card">
            <div class="cl-cover" onclick="window.location.href='/pages/checklist-detail.html?id=${c.checklistID}'">
              ${c.coverImage ? `<img src="${c.coverImage}" alt="">` : c.icon || "📋"}
              <span class="cl-public-badge">${c.isPublic ? "🌐 สาธารณะ" : "🔒 ส่วนตัว"}</span>
            </div>
            <div class="cl-body" onclick="window.location.href='/pages/checklist-detail.html?id=${c.checklistID}'">
              <div class="cl-title">${c.title}</div>
              ${c.description ? `<div class="cl-desc">${c.description}</div>` : ""}
            </div>
            <div class="cl-footer">
              <div>
                ${c.categoryName ? `<span class="badge" style="background:${catColor}22;color:${catColor}">${c.icon || "📂"} ${c.categoryName}</span>` : ""}
                <div class="cl-progress-text" style="margin-top:6px">${c.checkedCount}/${c.itemCount} รายการ</div>
                <div class="progress-bar" style="width:120px;margin-top:4px"><div class="progress-fill" style="width:${progress}%"></div></div>
              </div>
              <div class="cl-actions">
                <button class="icon-btn" onclick="editChecklist(${c.checklistID})" title="แก้ไข">✏️</button>
                <button class="icon-btn danger" onclick="deleteChecklist(${c.checklistID}, event)" title="ลบ">🗑️</button>
              </div>
            </div>
          </div>`;
            })
            .join("") +
          `</div>`;
      }

      function openCreateModal() {
        document.getElementById("edit-id").value = "";
        document.getElementById("modal-title").textContent =
          "สร้าง Checklist ใหม่";
        document.getElementById("cl-title").value = "";
        document.getElementById("cl-desc").value = "";
        document.getElementById("cl-category").value = "";
        document.getElementById("cl-public").value = "0";
        document
          .querySelectorAll(".vis-option")
          .forEach((el, i) => el.classList.toggle("active", i === 0));
        document.getElementById("cl-modal").classList.add("show");
      }

      async function editChecklist(id) {
        const cl = allChecklists.find((c) => c.checklistID == id);
        if (!cl) return;
        document.getElementById("edit-id").value = id;
        document.getElementById("modal-title").textContent = "แก้ไข Checklist";
        document.getElementById("cl-title").value = cl.title;
        document.getElementById("cl-desc").value = cl.description || "";
        document.getElementById("cl-category").value = cl.categoryID || "";
        document.getElementById("cl-public").value = cl.isPublic ? "1" : "0";
        document
          .querySelectorAll(".vis-option")
          .forEach((el, i) =>
            el.classList.toggle("active", cl.isPublic ? i === 1 : i === 0),
          );
        document.getElementById("cl-modal").classList.add("show");
      }

      function setVisibility(val, el) {
        document.getElementById("cl-public").value = val;
        document
          .querySelectorAll(".vis-option")
          .forEach((e) => e.classList.remove("active"));
        el.classList.add("active");
      }

      function closeModal() {
        document.getElementById("cl-modal").classList.remove("show");
      }

      async function saveChecklist() {
        const id = document.getElementById("edit-id").value;
        const title = document.getElementById("cl-title").value.trim();
        if (!title) return toast("กรุณากรอกชื่อ Checklist", "error");

        const fd = new FormData();
        fd.append("title", title);
        fd.append("description", document.getElementById("cl-desc").value);
        fd.append("categoryID", document.getElementById("cl-category").value);
        fd.append("isPublic", document.getElementById("cl-public").value);
        const file = document.getElementById("cl-cover").files[0];
        if (file) fd.append("coverImage", file);

        const res = id
          ? await API.put(`/api/checklists/${id}`, fd, true)
          : await API.post("/api/checklists", fd, true);

        if (res.success) {
          toast(id ? "แก้ไขสำเร็จ" : "สร้าง Checklist สำเร็จ");
          closeModal();
          await loadChecklists();
          if (!id)
            window.location.href = `/pages/checklist-detail.html?id=${res.checklistID}`;
        } else {
          toast(res.message || "เกิดข้อผิดพลาด", "error");
        }
      }

      async function deleteChecklist(id, e) {
        e.stopPropagation();
        if (!confirm("ลบ Checklist นี้หรือไม่?")) return;
        const res = await API.delete(`/api/checklists/${id}`);
        if (res.success) {
          toast("ลบแล้ว");
          await loadChecklists();
        } else toast(res.message, "error");
      }
    </script>
  </body>
</html>
